name: Webapp Vercel Production Deploy

on:
  push:
    branches: ["main", "master"]
    paths:
      - "webapp/**"
      - ".github/workflows/webapp_vercel_production.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-vercel-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-webapp-production:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Lint and type-check webapp
        working-directory: webapp
        run: npm run -s lint && npx tsc --noEmit

      - name: Build webapp
        working-directory: webapp
        run: npm run build

      - name: Deploy webapp to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: webapp
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "Missing one or more Vercel secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
